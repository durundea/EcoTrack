name: frontend-ci

on:
  pull_request:
  push:
    branches: [main, feat/frontend-mvp]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit and component tests
        run: npm test -- --run
      - name: Build
        run: npm run build
